<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in · GSS Workforce</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}</style>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center">

<div class="w-full max-w-sm bg-white rounded-lg border border-slate-200 p-6 shadow-sm">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-10 h-10 rounded bg-[#0b3b76] text-white flex items-center justify-center font-bold">GSS</div>
    <div>
      <div class="font-semibold">GSS Workforce</div>
      <div class="text-xs text-slate-500">Manager sign-in</div>
    </div>
  </div>

  <form id="login-form" class="space-y-3">
    <label class="block">
      <span class="text-xs font-medium text-slate-600">Email</span>
      <input id="email" type="email" required class="mt-1 w-full border rounded px-3 py-2" />
    </label>
    <label class="block">
      <span class="text-xs font-medium text-slate-600">Password</span>
      <input id="password" type="password" required class="mt-1 w-full border rounded px-3 py-2" />
    </label>
    <div id="err" class="text-xs text-red-600 hidden"></div>
    <button class="w-full bg-[#0b3b76] text-white py-2 rounded font-medium hover:opacity-90">Sign in</button>
  </form>

  <div class="mt-4 text-xs text-slate-500 border-t pt-3">
    For access, contact your GSS administrator. Accounts are provisioned in Supabase.
  </div>
</div>

<script src="/config.js"></script>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

if (!window.GSS_CONFIG || !window.GSS_CONFIG.SUPABASE_URL.startsWith("https://")) {
  document.getElementById("err").textContent = "Frontend not configured — edit public/config.js.";
  document.getElementById("err").classList.remove("hidden");
}

const supabase = createClient(window.GSS_CONFIG.SUPABASE_URL, window.GSS_CONFIG.SUPABASE_ANON_KEY);

// already signed in? bounce
const { data: { session } } = await supabase.auth.getSession();
if (session) location.replace("/index.html");

document.getElementById("login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email    = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const err = document.getElementById("err");
  err.classList.add("hidden");

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) {
    err.textContent = error.message;
    err.classList.remove("hidden");
    return;
  }
  location.replace("/index.html");
});
</script>
</body>
</html>
